<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpeakLoop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 to-indigo-50 dark:from-slate-900 dark:to-slate-900 font-sans text-slate-900 dark:text-slate-100 transition-colors duration-300">

  <!-- Header -->
  <header class="py-6 px-4">
    <div class="max-w-2xl mx-auto flex items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center shadow-sm">
          <i class="ph ph-microphone text-white text-xl"></i>
        </div>
        <div>
          <h1 class="text-xl font-bold text-indigo-600 leading-none">SpeakLoop</h1>
          <p class="text-xs text-slate-400 dark:text-slate-500 mt-0.5">English pronunciation practice</p>
        </div>
      </div>
      <button id="btn-theme-toggle"
        class="w-9 h-9 rounded-xl bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 flex items-center justify-center transition-colors"
        aria-label="Toggle dark mode">
        <i id="theme-icon" class="ph ph-moon text-slate-600 dark:text-slate-300 text-lg"></i>
      </button>
    </div>
  </header>

  <main class="px-4 pb-16">
    <div class="max-w-2xl mx-auto">

      <!-- ── SECTION: Setup ──────────────────────────────────────────────── -->
      <section id="section-setup">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-8">
          <h2 class="text-2xl font-bold mb-1">Set up your practice</h2>
          <p class="text-slate-500 dark:text-slate-400 text-sm mb-8">Customize the text to match your professional context.</p>

          <form id="setup-form" class="space-y-5">
            <div>
              <label for="input-role" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">
                Your Role
              </label>
              <input id="input-role" type="text"
                placeholder="e.g. Software Engineer, Product Manager"
                class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                required />
            </div>

            <div>
              <label for="input-interests" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">
                Interests <span class="text-slate-400 dark:text-slate-500 font-normal">(comma-separated)</span>
              </label>
              <input id="input-interests" type="text"
                placeholder="e.g. microservices, cloud computing, CI/CD"
                class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                required />
            </div>

            <div>
              <label for="input-length" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">
                Target Length <span class="text-slate-400 dark:text-slate-500 font-normal">(words)</span>
              </label>
              <input id="input-length" type="number" value="80" min="30" max="300"
                class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                required />
            </div>

            <button id="btn-generate" type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:opacity-60 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-lg transition-colors flex items-center justify-center gap-2 mt-2">
              <i class="ph ph-sparkle text-lg"></i>
              Generate Practice Text
            </button>
          </form>
        </div>
      </section>

      <!-- ── SECTION: Practice ───────────────────────────────────────────── -->
      <section id="section-practice" class="hidden">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-8">
          <div class="flex items-start justify-between mb-6 gap-4">
            <div>
              <h2 class="text-xl font-bold">Read aloud</h2>
              <p class="text-slate-500 dark:text-slate-400 text-sm mt-0.5">Press record, then read the text below clearly.</p>
            </div>
            <span id="recording-badge"
              class="hidden items-center gap-1.5 text-xs font-semibold text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 px-3 py-1.5 rounded-full shrink-0">
              <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
              Recording
            </span>
          </div>

          <div class="bg-slate-50 dark:bg-slate-700/50 rounded-xl p-6 mb-8 border border-slate-100 dark:border-slate-600 min-h-[120px]">
            <p id="practice-text" class="text-lg leading-relaxed text-slate-800 dark:text-slate-200 font-medium"></p>
          </div>

          <div class="flex gap-3">
            <button id="btn-record"
              class="flex-1 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-lg transition-colors flex items-center justify-center gap-2">
              <i class="ph ph-microphone text-xl"></i>
              Start Recording
            </button>
            <button id="btn-stop" disabled
              class="flex-1 bg-red-500 hover:bg-red-600 disabled:opacity-40 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-lg transition-colors flex items-center justify-center gap-2">
              <i class="ph ph-stop-circle text-xl"></i>
              Stop &amp; Evaluate
            </button>
          </div>
        </div>
      </section>

      <!-- ── SECTION: Loading ────────────────────────────────────────────── -->
      <section id="section-loading" class="hidden">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-16 flex flex-col items-center text-center">
          <div class="w-14 h-14 rounded-full border-4 border-indigo-200 dark:border-indigo-900 border-t-indigo-600 animate-spin mb-6"></div>
          <h2 class="text-lg font-bold text-slate-800 dark:text-slate-200">Evaluating your pronunciation…</h2>
          <p class="text-slate-400 dark:text-slate-500 text-sm mt-2">This may take a few seconds.</p>
        </div>
      </section>

      <!-- ── SECTION: Feedback ───────────────────────────────────────────── -->
      <section id="section-feedback" class="hidden space-y-4">

        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-8 text-center">
          <p class="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-3">Accuracy Score</p>
          <p id="accuracy-score" class="text-8xl font-bold mb-2"></p>
          <p id="score-label" class="text-sm font-semibold"></p>
        </div>

        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-6">
          <p class="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-3">Original Text</p>
          <p id="original-text" class="text-slate-800 dark:text-slate-200 leading-relaxed text-sm font-medium"></p>
        </div>

        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-6">
          <p class="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-3">What we heard</p>
          <p id="transcribed-text" class="text-slate-700 dark:text-slate-300 leading-relaxed text-sm"></p>
        </div>

        <div id="corrections-container"></div>

        <div class="flex gap-3">
          <button id="btn-try-again"
            class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition-colors flex items-center justify-center gap-2">
            <i class="ph ph-microphone text-lg"></i>
            Try it again
          </button>
          <button id="btn-restart"
            class="flex-1 bg-slate-700 hover:bg-slate-800 dark:bg-slate-600 dark:hover:bg-slate-500 text-white font-semibold py-3 rounded-lg transition-colors flex items-center justify-center gap-2">
            <i class="ph ph-arrow-counter-clockwise text-lg"></i>
            Start Over
          </button>
        </div>

      </section>

    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
